<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻找王曼昱 - Searching for Wang M.Y.</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        /* ========== 封面页独有样式 ========== */
        
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #000000;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
        }

        /* 背景图片层 - 铺满全屏 */
        .cover-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .cover-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        /* 背景暗色遮罩 - 让按钮更突出 */
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* 底部内容区 */
        .cover-bottom {
            position: relative;
            z-index: 3;
            width: 100%;
            padding: 40px 30px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* 游戏副标题 */
        .cover-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            letter-spacing: 6px;
            text-align: center;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* 开始游戏按钮 - 独特设计 */
        .btn-start {
            width: 220px;
            height: 56px;
            background: transparent;
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            color: #ffffff;
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border-radius: 0;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .btn-start::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            transition: left 0.5s ease;
        }

        .btn-start:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            letter-spacing: 12px;
        }

        .btn-start:hover::before {
            left: 100%;
        }

        .btn-start:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        /* 底部版权信息 */
        .cover-credit {
            color: rgba(255, 255, 255, 0.35);
            font-size: 11px;
            letter-spacing: 3px;
            text-align: center;
            font-weight: 300;
            margin-top: 10px;
        }

        /* 电脑端适配 */
        @media (min-width: 768px) {
            .scene-container {
                max-width: 100vw;
                margin: 0;
                border-radius: 0;
            }
            
            .btn-start {
                width: 260px;
                height: 62px;
                font-size: 20px;
                letter-spacing: 10px;
            }
            
            .cover-bottom {
                padding: 50px 40px 60px;
            }
        }

        /* 超大屏居中 */
        @media (min-width: 1400px) {
            .scene-container {
                max-width: 500px;
                margin: 0 auto;
                border-left: 1px solid rgba(255,255,255,0.1);
                border-right: 1px solid rgba(255,255,255,0.1);
            }
        }
    </style>
</head>
<body>
    <!-- 主场景容器 -->
    <div class="scene-container page-enter">
        
        <!-- 背景图片 -->
        <div class="cover-background">
            <img src="assets/images/cover-bg.jpg" alt="封面背景">
        </div>

        <!-- 底部渐变遮罩 -->
        <div class="cover-overlay"></div>

        <!-- 底部按钮区域 -->
        <div class="cover-bottom">
            <p class="cover-subtitle">网页解密游戏</p>
            
            <button class="btn-start" id="btnStart" onclick="startGame()">
                开 始 游 戏
            </button>

            <p class="cover-credit">A Special Milestone of 10000 Days</p>
        </div>

    </div>

    <!-- 引入全局公共JS -->
    <script src="assets/js/global.js"></script>

    <script>
        function startGame() {
            GameAPI.audio.click();
            
            if (!GameAPI.storage.get('gameStarted')) {
                GameAPI.storage.set('gameStarted', true);
                GameAPI.storage.set('startTime', new Date().toISOString());
                console.log('📝 游戏存档已初始化');
            }

            GameAPI.navigateTo('pages/title-page.html', 400);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                startGame();
            }
        });

        console.log('🎮 封面页加载完成 - 寻找王曼昱');
        console.log('💡 提示：点击"开始游戏"按钮或按 Enter 键开始');
    </script>
</body>
</html>
