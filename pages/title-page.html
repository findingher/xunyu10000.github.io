<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扉页 - 寻找王曼昱</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        /* ========== 扉页独有样式 ========== */

        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #000000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .cover-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .cover-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            filter: blur(20px) brightness(0.5);
            -webkit-filter: blur(20px) brightness(0.5);
        }

        .grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: 
                radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(255,255,255,0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        .welcome-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: fadeIn 0.6s ease;
        }

        .welcome-card {
            background: rgba(0, 47, 167, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 36px 28px 32px;
            margin: 0 24px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(255, 255, 255, 0.03) inset;
            animation: scaleIn 0.5s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .welcome-title {
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .welcome-divider {
            width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.4);
            margin: 16px auto 20px;
        }

        .welcome-notice-list {
            list-style: none;
            padding: 0;
            margin: 0 0 28px;
            text-align: left;
        }

        .welcome-notice-list li {
            color: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            line-height: 1.8;
            padding-left: 20px;
            position: relative;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .welcome-notice-list li::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 8px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
        }

        .welcome-notice-list li.no-dot::before {
            display: none;
        }

        .btn-confirm {
            width: 160px;
            height: 48px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #ffffff;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 6px;
            cursor: pointer;
            transition: all 0.35s ease;
            border-radius: 0;
            text-transform: uppercase;
        }

        .btn-confirm:hover {
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            letter-spacing: 8px;
        }

        .btn-confirm:active {
            transform: scale(0.96);
        }

        .welcome-footer {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: 16px;
        }

        @media (min-width: 768px) {
            .welcome-card {
                padding: 44px 36px 38px;
                border-radius: 20px;
            }
            .welcome-title {
                font-size: 22px;
            }
            .welcome-notice-list li {
                font-size: 14px;
                line-height: 2;
            }
            .btn-confirm {
                width: 180px;
                height: 52px;
                font-size: 16px;
            }
        }

        @media (min-width: 1400px) {
            .scene-container {
                max-width: 500px;
                margin: 0 auto;
                border-left: 1px solid rgba(255,255,255,0.1);
                border-right: 1px solid rgba(255,255,255,0.1);
            }
        }
    </style>
</head>
<body>
    <div class="scene-container page-enter">

        <div class="cover-background">
            <img src="../assets/images/cover-bg.jpg" alt="背景">
        </div>

        <div class="grain-overlay"></div>

        <div class="welcome-overlay" id="welcomeOverlay">
            <div class="welcome-card">
                
                <h2 class="welcome-title">游 戏 须 知</h2>
                <div class="welcome-divider"></div>

                <ul class="welcome-notice-list">
                    <li>
                        本游戏为虚构创作，与现实人物、事件、地点无任何实际关联，请勿过度代入现实联想。
                    </li>
                    <li>
                        本作含极少量CP向内容，纯属趣味创作，与主线走向、核心世界观无关，不影响游戏体验与解谜过程。
                    </li>
                    <li>
                        本游戏仅有唯一最终结局，解谜难度不大，可从搜索引擎处切入推进剧情。
                    </li>
                    <li class="no-dot" style="color: rgba(255, 255, 255, 0.75); font-size: 13px; text-align: center; padding-left: 0; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 12px; margin-top: 12px;">
                        ⚠ 游戏过程中请使用页面内按钮返回<br>若返回后出现空白画面，刷新页面即可
                    </li>
                    <li class="no-dot" style="color: rgba(255, 255, 255, 0.75); font-size: 13px; text-align: center; padding-left: 0; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px 12px;">
                        如有任何疑问或查看游戏攻略请移步微博<br>@寻昱10000解谜企划
                    </li>
                </ul>

                <button class="btn-confirm" id="btnConfirm" onclick="confirmNotice()">
                    我 知 道 了
                </button>

                <p class="welcome-footer">Searching for Wang M.Y.</p>
            </div>
        </div>

    </div>

    <script src="../assets/js/global.js"></script>

    <script>
        function confirmNotice() {
            GameAPI.audio.success();
            GameAPI.storage.set('noticeAccepted', true);
            console.log('📝 玩家已阅读游戏须知');
            GameAPI.navigateTo('loading.html', 400);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                confirmNotice();
            }
        });

        console.log('📄 扉页加载完成 - 游戏须知');
    </script>
</body>
</html>
