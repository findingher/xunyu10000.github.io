<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>当一个女孩非常想赢 - 生菜小说</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #f5f5f5;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-header {
            position: relative;
            z-index: 10;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .btn-back {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            color: #333;
            font-size: 20px;
            border: none;
            background: none;
        }
        .btn-back:hover { background: #f5f5f5; }
        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 0 16px;
            height: 42px;
            border: 1.5px solid transparent;
        }
        .search-icon { color: #999; font-size: 17px; margin-right: 8px; flex-shrink: 0; }
        .search-keyword {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #333;
            font-family: var(--font-sans);
        }
        .btn-clear {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #c0c0c0;
            border: none;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-clear:hover { background: #999; }
        .btn-search-text {
            flex-shrink: 0;
            padding: 0 8px;
            color: #4e6ef2;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
        }
        .search-info {
            padding: 10px 20px;
            background: #ffffff;
            font-size: 13px;
            color: #999;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .search-info .count { color: #333; font-weight: 500; }
        .search-info .brand { font-size: 11px; color: #4caf50; font-weight: 500; }
        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: #ffffff;
        }
        .result-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .result-item:hover { background: #fafbff; }
        .result-item:active { background: #f0f2ff; }
        .result-title {
            font-size: 17px;
            font-weight: 600;
            color: #1a0dab;
            line-height: 1.5;
            margin-bottom: 4px;
        }
        .highlight { color: #b30808; font-weight: 600; }
        .result-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .result-meta .source { color: #1a8a3a; font-weight: 500; }
        .pagination {
            padding: 16px;
            background: #ffffff;
            text-align: center;
            border-top: 1px solid #eee;
        }
        .pagination-text { font-size: 13px; color: #999; }
        @media (min-width: 768px) {
            .scene-container {
                max-width: 480px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 12px;
                border: 1px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
<div class="scene-container page-enter">

    <div class="search-header">
        <button class="btn-back" onclick="goBack()" title="返回">←</button>
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-keyword" id="searchKeyword" value="当一个女孩非常想赢" readonly>
            <button class="btn-clear" onclick="clearAndGoBack()">✕</button>
        </div>
        <button class="btn-search-text" onclick="doSearch()">搜索</button>
    </div>

    <div class="search-info">
        <span>找到约 <span class="count">1</span> 条相关结果</span>
        <span class="brand">🥬 生菜小说</span>
    </div>

    <div class="results-list">
        <div class="result-item" onclick="showDetail(1)" style="display:flex;align-items:center;gap:14px;">
            <div style="width:72px;height:96px;border-radius:6px;background:#e8e2d2;flex-shrink:0;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:center;color:#bbb;font-size:11px;">
                              <img src="../assets/images/novel-cover.png" alt="封面" style="width:100%;height:100%;object-fit:cover;">
            </div>
            <div style="flex:1;min-width:0;">
                <div class="result-title" style="margin-bottom:6px;">
                    <span class="highlight">当一个女孩非常想赢</span>
                </div>
                <div class="result-meta">
                    <span class="source">水瓶鱼209</span>
                    <span>未完结 · 1.6w字</span>
                </div>
                <div style="display:flex;gap:6px;margin:6px 0;">
                    <span style="padding:2px 8px;background:#f0f0f0;border-radius:10px;font-size:10px;color:#888;">女主向</span>
                    <span style="padding:2px 8px;background:#f0f0f0;border-radius:10px;font-size:10px;color:#888;">竞体</span>
                    <span style="padding:2px 8px;background:#f0f0f0;border-radius:10px;font-size:10px;color:#888;">网球</span>
                </div>
                <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#999;">
                    <span style="color:#ff8200;font-weight:600;">8.7分</span>
                    <span>·</span>
                    <span>1811人读过</span>
                </div>
            </div>
            <div style="flex-shrink:0;padding:6px 14px;background:#4caf50;color:#fff;border-radius:16px;font-size:12px;font-weight:500;">阅读</div>
        </div>
    </div>

    <div class="pagination">
        <span class="pagination-text">共 1 条结果</span>
    </div>

</div>

<script src="../assets/js/global.js"></script>
<script>
    function showDetail(index) {
        const resultPages = { 1: 'novel-book.html' };
        const targetPage = resultPages[index];
        if (targetPage) {
            GameAPI.storage.set('lastClickedResult', index);
            GameAPI.navigateTo(targetPage, 300);
        }
    }
    function goBack() { GameAPI.navigateTo('search.html', 200); }
    function clearAndGoBack() { goBack(); }
    function doSearch() { GameAPI.navigateTo('search.html', 200); }
    console.log('📋 搜索结果页加载完成');
</script>
</body>
</html>
