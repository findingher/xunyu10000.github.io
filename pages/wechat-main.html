<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>微信</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #ededed;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .wechat-top-bar {
            position: relative;
            z-index: 10;
            background: #ededed;
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 17px;
            font-weight: 600;
            color: #191919;
        }
        .top-action {
            width: 24px;
            height: 24px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .top-action img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .top-action:hover {
            opacity: 0.7;
        }
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 60px;
        }
        .wechat-list {
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        .wechat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.15s;
            position: relative;
        }
        .wechat-item:last-child { border-bottom: none; }
        .wechat-item:active { background: #ececec; }
        .wechat-icon {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #07c160;
        }
        .wechat-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }
        .wechat-info {
            flex: 1;
            min-width: 0;
        }
        .wechat-name {
            font-size: 16px;
            color: #191919;
            font-weight: 400;
        }
        .wechat-desc {
            font-size: 13px;
            color: #999;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .wechat-right {
            text-align: right;
            flex-shrink: 0;
        }
        .wechat-time {
            font-size: 12px;
            color: #b0b0b0;
        }
        .section-gap {
            height: 8px;
            background: #ededed;
        }
        .bottom-nav {
            position: relative;
            z-index: 10;
            background: #f7f7f7;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0;
            padding-bottom: max(6px, env(safe-area-inset-bottom));
        }
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px 8px;
            font-size: 10px;
            color: #999;
            font-family: var(--font-sans);
            transition: color 0.1s;
        }
        .nav-tab.active { color: #07c160; }
        .nav-tab .tab-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }
        .nav-tab .tab-icon img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            display: block;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.2s ease;
        }
        .modal-box {
            background: #fff;
            border-radius: 12px;
            width: 85%;
            max-width: 360px;
            overflow: hidden;
            animation: scaleIn 0.25s ease;
        }
        .modal-header {
            padding: 16px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #191919;
            border-bottom: 1px solid #f0f0f0;
            position: relative;
        }
        .modal-close {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            padding: 20px;
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 0 12px;
            height: 44px;
            gap: 8px;
        }
        .search-input-wrap .search-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .search-input-wrap .search-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .search-input-wrap input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            outline: none;
            color: #333;
        }
        .search-input-wrap input::placeholder { color: #bbb; }
        .btn-search-add {
            width: 100%;
            height: 44px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-search-add:active { opacity: 0.8; }
        .modal-error {
            color: #f35151;
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
        .modal-error.show { display: block; }

        .friend-result {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .friend-avatar {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            overflow: hidden;
            background: #4e6ef2;
        }
        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .friend-info { flex: 1; 
            text-align: left;
            margin-left: 0;      
            padding-left: 0; }
        .friend-name {
            font-size: 15px;
            font-weight: 500;
            color: #191919;
        }
        .friend-id {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .btn-add-friend {
            padding: 8px 18px;
            background: #07c160;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .btn-add-friend:active { opacity: 0.8; }

        .verify-textarea {
            width: 100%;
            height: 60px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            font-size: 14px;
            resize: none;
            outline: none;
            margin-top: 12px;
            font-family: inherit;
            color: #333;
        }
        .verify-textarea::placeholder { color: #bbb; }

        .waiting-box {
            text-align: center;
            padding: 20px 0;
        }
        .waiting-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #07c160;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        .waiting-text {
            font-size: 14px;
            color: #999;
        }

        @media (min-width: 768px) {
            .scene-container {
                max-width: 430px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 24px;
                border: 1px solid #d0d0d0;
            }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="scene-container page-enter">

    <div class="wechat-top-bar">
        <button onclick="goToDesktop()" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#191919;border:none;background:none;">←</button>
        <span>微信</span>
        <button class="top-action" onclick="openAddFriend()">
            <img src="../assets/images/vx-addone.png" alt="添加朋友">
        </button>
    </div>

    <div class="main-scroll" id="mainScroll">
        <!-- 动态聊天列表区域(添加好友后会显示) -->
        <div id="chatListArea"></div>

        <!-- 微信支付 -->
        <div class="wechat-list">
            <div class="wechat-item">
                <div class="wechat-icon">
                    <img src="../assets/images/vx-pay.jpg" alt="微信支付" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div class="wechat-info">
                    <div class="wechat-name">微信支付</div>
                    <div class="wechat-desc">支付凭证 · 交易提醒</div>
                </div>
                <div class="wechat-right">
                    <div class="wechat-time">12:30</div>
                </div>
            </div>
        </div>

        <div class="section-gap"></div>

        <!-- 微信运动 -->
        <div class="wechat-list">
            <div class="wechat-item">
                <div class="wechat-icon">
                    <img src="../assets/images/vx-chat.jpg" alt="微信运动" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div class="wechat-info">
                    <div class="wechat-name">微信运动</div>
                    <div class="wechat-desc">今日步数 8,642 步 · 排名第 12 位</div>
                </div>
                <div class="wechat-right">
                    <div class="wechat-time">22:00</div>
                </div>
            </div>
        </div>

        <div class="section-gap"></div>

        <!-- 文件传输助手 -->
        <div class="wechat-list">
            <div class="wechat-item">
                <div class="wechat-icon">
                    <img src="../assets/images/vx-file.jpg" alt="文件传输助手" style="width:100%;height:100%;object-fit:cover;">
                </div>
                <div class="wechat-info">
                    <div class="wechat-name">文件传输助手</div>
                    <div class="wechat-desc">[图片]</div>
                </div>
                <div class="wechat-right">
                    <div class="wechat-time">昨天</div>
                </div>
            </div>
        </div>

        <div style="height:20px;"></div>
    </div>

    <!-- 底部导航栏：四个图标全部改为PNG图片 -->
    <div class="bottom-nav">
        <div class="nav-tab active" data-nav="chat">
            <div class="tab-icon">
                <img src="../assets/images/vx-message.png" alt="微信" style="width:24px;height:24px;object-fit:contain;">
            </div>
            <span>微信</span>
        </div>
        <div class="nav-tab" data-nav="contacts">
            <div class="tab-icon">
                <img src="../assets/images/vx-addressbook.png" alt="通讯录" style="width:24px;height:24px;object-fit:contain;">
            </div>
            <span>通讯录</span>
        </div>
        <div class="nav-tab" data-nav="discover">
            <div class="tab-icon">
                <img src="../assets/images/vx-more.png" alt="发现" style="width:24px;height:24px;object-fit:contain;">
            </div>
            <span>发现</span>
        </div>
        <div class="nav-tab" data-nav="me" onclick="switchToMe()">
            <div class="tab-icon">
                <img src="../assets/images/vx-me.png" alt="我" style="width:24px;height:24px;object-fit:contain;">
            </div>
            <span>我</span>
        </div>
    </div>
</div>

<!-- 添加朋友弹窗 -->
<div class="modal-overlay" id="addFriendModal" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            添加朋友
            <button class="modal-close" onclick="closeAddFriend()">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="search-input-wrap">
                <span class="search-icon">
                    <img src="../assets/images/search.png" alt="搜索">
                </span>
                <input type="text" id="friendInput" placeholder="请输入微信号/手机号" autocomplete="off">
            </div>
            <p class="modal-error" id="modalError">未找到该用户，请检查输入</p>
            <button class="btn-search-add" onclick="searchFriend()">搜索</button>
        </div>
    </div>
</div>

<script src="../assets/js/global.js"></script>
<script>
    const CORRECT_FRIEND_ID = 'm9a9n_y209u';
    // 使用 sessionStorage 存储好友状态，关闭整个网页（标签页）后自动清除
    // 刷新页面会保留，但关闭 index.html 再打开就会消失

    // 添加好友到聊天列表
    function addChatToList() {
        const area = document.getElementById('chatListArea');
        // 如果已经存在好友条目，不再重复添加
        if (area.querySelector('.wechat-item') && area.querySelector('.wechat-name')?.innerText === '🐟') {
            return;
        }
        area.innerHTML = `
            <div class="wechat-list">
                <div class="wechat-item" onclick="openChatPage()">
                    <div class="wechat-icon" id="dynamicFriendAvatar">
                        <img src="../assets/images/avatar-xiaoyu-wechat.png" alt="🐟头像" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <div class="wechat-info">
                        <div class="wechat-name">🐟</div>
                        <div class="wechat-desc">你们已经是好友了，可以开始聊天</div>
                    </div>
                    <div class="wechat-right">
                        <div class="wechat-time">刚刚</div>
                    </div>
                </div>
            </div>
            <div class="section-gap"></div>
        `;
    }
    
    // 移除好友列表（仅用于初始清除）
    function removeChatFromList() {
        const area = document.getElementById('chatListArea');
        area.innerHTML = '';
    }
    
    function openChatPage() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio) GameAPI.audio.click();
        if (typeof GameAPI !== 'undefined' && GameAPI.navigateTo) GameAPI.navigateTo('wechat-chat.html', 300);
        else console.log('跳转到聊天页');
    }
    
    function openAddFriend() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio) GameAPI.audio.click();
        document.getElementById('addFriendModal').style.display = 'flex';
        document.getElementById('modalBody').innerHTML = `
            <div class="search-input-wrap">
                <span class="search-icon">
                    <img src="../assets/images/search.png" alt="搜索">
                </span>
                <input type="text" id="friendInput" placeholder="请输入微信号/手机号" autocomplete="off">
            </div>
            <p class="modal-error" id="modalError">未找到该用户，请检查输入</p>
            <button class="btn-search-add" onclick="searchFriend()">搜索</button>
        `;
        setTimeout(() => {
            const input = document.getElementById('friendInput');
            if (input) input.focus();
        }, 300);
    }
    
    function closeAddFriend() {
        document.getElementById('addFriendModal').style.display = 'none';
    }
    
    function searchFriend() {
        const input = document.getElementById('friendInput');
        const error = document.getElementById('modalError');
        const value = input.value.trim();
        
        if (!value) {
            error.textContent = '请输入微信号/手机号';
            error.classList.add('show');
            return;
        }
        
        // 只有输入正确的微信号才能搜索到 🐟
        if (value === CORRECT_FRIEND_ID) {
            document.getElementById('modalBody').innerHTML = `
                <div class="friend-result">
                    <div class="friend-avatar" style="background:#4e6ef2;">
                        <img src="../assets/images/avatar-xiaoyu-wechat.png" alt="头像" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <div class="friend-info">
                        <div class="friend-name">🐟</div>
                        <div class="friend-id">微信号：m9a9n_y209u</div>
                        <div class="friend-id">地区：黑龙江 哈尔滨</div>
                    </div>
                </div>
                <textarea class="verify-textarea" id="verifyMsg" placeholder="发送验证申请，等待对方通过">你好，我是 </textarea>
                <button class="btn-search-add" onclick="sendVerify()">发送验证申请</button>
            `;
        } else {
            error.textContent = '未找到该用户，请检查输入';
            error.classList.add('show');
        }
    }
    
    function sendVerify() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio) GameAPI.audio.click();
        const verifyMsgInput = document.getElementById('verifyMsg');
        const verifyMessage = verifyMsgInput ? verifyMsgInput.value : '你好，我是 ';
        console.log('发送验证申请，验证消息：', verifyMessage);
        
        document.getElementById('modalBody').innerHTML = `
            <div class="waiting-box">
                <div class="waiting-spinner"></div>
                <div class="waiting-text">等待对方验证通过</div>
            </div>
        `;
        setTimeout(() => {
            friendAccepted();
        }, 2000);
    }
    
    function friendAccepted() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio && GameAPI.audio.success) GameAPI.audio.success();
        // 使用 sessionStorage 存储好友状态（关闭整个网页后自动清除）
        sessionStorage.setItem('wechat_friend_added', 'true');
        console.log('✅ 已添加好友：🐟（使用 sessionStorage，关闭标签页后消失）');
        closeAddFriend();
        addChatToList();
        // 不再自动跳转
    }
    
    function switchToMe() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio) GameAPI.audio.click();
        console.log('👤 切换到微信个人页');
    }
    
    function goToDesktop() {
        if (typeof GameAPI !== 'undefined' && GameAPI.audio) GameAPI.audio.click();
        if (typeof GameAPI !== 'undefined' && GameAPI.navigateTo) GameAPI.navigateTo('desktop.html', 200);
        else console.log('返回桌面');
    }
    
    // 导航切换样式
    function initNavTabs() {
        const tabs = document.querySelectorAll('.nav-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                if (tab.getAttribute('data-nav') === 'me') {
                    switchToMe();
                } else {
                    console.log(`切换到 ${tab.querySelector('span:last-child')?.innerText} 页面`);
                }
            });
        });
    }
    
    window.addEventListener('DOMContentLoaded', function() {
        // 从 sessionStorage 读取好友添加状态
        // sessionStorage 的特点：刷新页面保留数据，关闭整个标签页/窗口后数据自动清除
        const friendAddedStorage = sessionStorage.getItem('wechat_friend_added');
        
        if (friendAddedStorage === 'true') {
            addChatToList();  // 恢复好友列表
            console.log('✅ 从 sessionStorage 恢复好友：🐟（刷新页面保留，关闭标签页后消失）');
        } else {
            // 清空聊天列表区域
            const area = document.getElementById('chatListArea');
            if (area) area.innerHTML = '';
            console.log('📭 无好友记录，聊天列表为空');
        }
        
        initNavTabs();
        console.log('💬 微信主页加载完成 | 好友状态使用 sessionStorage（关闭标签页后消失）');
        console.log('🔍 添加朋友微信号：m9a9n_y209u（只有输入正确微信号才能搜索到）');
        console.log('📷 图片已固定，不可更改');
    });
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const modal = document.getElementById('addFriendModal');
            if (modal.style.display === 'flex') {
                const input = document.getElementById('friendInput');
                if (input && document.activeElement === input) {
                    searchFriend();
                }
            }
        }
    });
</script>
</body>
</html>
