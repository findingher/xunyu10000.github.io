<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微博 - 登录</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        /* ========== 微博登录页独有样式 ========== */

        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== 顶部导航 ===== */
        .weibo-nav {
            position: relative;
            z-index: 10;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-back {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            color: #333;
            font-size: 18px;
            border: none;
            background: none;
        }
        .btn-back:hover { background: #f5f5f5; }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .nav-placeholder {
            width: 32px;
        }

        /* ===== 可滚动内容 ===== */
        .login-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ===== Logo 区域 ===== */
        .login-logo {
            text-align: center;
            padding: 80px 0 10px;
        }
        .login-logo .logo-icon {
            display: none;
        }
        .login-logo .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #e62e2e;
            letter-spacing: 2px;
        }
        .login-logo .logo-sub {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ===== 登录表单 ===== */
        .login-form {
            padding: 20px 32px;
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }
        .input-group .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            z-index: 2;
            pointer-events: none;
        }
        .input-group .input-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .input-group .login-input {
            width: 100%;
            height: 50px;
            padding: 0 16px 0 48px;
            border: 1.5px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            background: #fafafa;
            outline: none;
            transition: all 0.25s ease;
            font-family: var(--font-sans);
            letter-spacing: 0.5px;
        }
        .input-group .login-input:focus {
            border-color: #ff8200;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 130, 0, 0.08);
        }
        .input-group .login-input::placeholder {
            color: #c0c0c0;
        }

        /* 密码显示切换按钮 */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            cursor: pointer;
            z-index: 2;
            user-select: none;
            transition: opacity 0.2s;
        }
        .toggle-password img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .toggle-password:hover {
            opacity: 0.7;
        }

        /* 记住密码行 */
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 13px;
            color: #888;
        }
        .remember-row label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #ff8200;
            cursor: pointer;
        }
        .forgot-link {
            color: #ff8200;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        /* 登录按钮 */
        .btn-login {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #ff8200 0%, #ff6b4a 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(255, 130, 0, 0.3);
        }
        .btn-login:hover {
            box-shadow: 0 6px 20px rgba(255, 130, 0, 0.4);
            transform: translateY(-1px);
        }
        .btn-login:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255, 130, 0, 0.3);
        }

        /* 底部注册 */
        .register-row {
            text-align: center;
            padding: 30px 0 30px;
            font-size: 13px;
            color: #888;
        }
        .register-row .register-link {
            color: #ff8200;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
        }
        .register-row .register-link:hover {
            text-decoration: underline;
        }

        /* 错误提示 */
        .error-msg {
            text-align: center;
            color: #e62e2e;
            font-size: 13px;
            margin-top: -8px;
            margin-bottom: 12px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }

        /* 响应式 */
        @media (min-width: 768px) {
            .scene-container {
                max-width: 450px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 20px;
                border: 1px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
    <!-- 主场景容器 -->
    <div class="scene-container page-enter">

        <!-- 顶部导航 -->
        <div class="weibo-nav">
            <button class="btn-back" onclick="goBack()" title="返回">←</button>
            <span class="nav-title">微博登录</span>
            <div class="nav-placeholder"></div>
        </div>

        <!-- 可滚动内容 -->
        <div class="login-scroll">

            <!-- Logo 区域 -->
            <div class="login-logo">
                <div class="logo-icon"></div>
                <div class="logo-text">微 博</div>
                <div class="logo-sub">随时随地发现新鲜事</div>
            </div>

            <!-- 登录表单 -->
            <div class="login-form">
                <!-- 用户名 -->
                <div class="input-group">
                    <span class="input-icon">
                        <img src="../assets/images/weibo-user.png" alt="用户图标">
                    </span>
                    <input 
                        type="text" 
                        class="login-input" 
                        id="usernameInput" 
                        placeholder="请输入用户名/手机号/邮箱"
                        autocomplete="username"
                    >
                </div>

                <!-- 密码 -->
                <div class="input-group">
                    <span class="input-icon">
                        <img src="../assets/images/weibo-password.png" alt="密码图标">
                    </span>
                    <input 
                        type="password" 
                        class="login-input" 
                        id="passwordInput" 
                        placeholder="请输入密码"
                        autocomplete="current-password"
                    >
                    <span class="toggle-password" id="togglePassword" onclick="togglePassword()">
                        <img src="../assets/images/locked.png" alt="密码显示" id="toggleIcon">
                    </span>
                </div>

                <!-- 错误提示 -->
                <p class="error-msg" id="errorMsg">用户名或密码错误，请重试</p>

                <!-- 记住密码 -->
                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="rememberCheck">
                        记住密码
                    </label>
                    <a class="forgot-link" onclick="forgotPassword()">忘记密码？</a>
                </div>

                <!-- 登录按钮 -->
                <button class="btn-login" onclick="handleLogin()">登 录</button>

                <!-- 注册入口 -->
                <div class="register-row">
                    还没有账号？<a class="register-link" onclick="goRegister()">立即注册</a>
                </div>
            </div>

        </div>

    </div>

    <!-- 引入全局公共JS -->
    <script src="../assets/js/global.js"></script>

    <script>
        // ========== 微博登录页独有逻辑 ==========

        const VALID_USERNAME = 'EatOatmealEveryday';
        const VALID_PASSWORD = '10000withme';

        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const rememberCheck = document.getElementById('rememberCheck');
        const toggleIcon = document.getElementById('toggleIcon');

        // 页面加载时自动填入账号密码
        window.addEventListener('DOMContentLoaded', function() {
            usernameInput.value = 'EatOatmealEveryday';
            passwordInput.value = '10000withme';
        });

        function handleLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            errorMsg.classList.remove('show');

            if (!username) {
                showError('请输入用户名');
                usernameInput.focus();
                return;
            }
            if (!password) {
                showError('请输入密码');
                passwordInput.focus();
                return;
            }

            if ((username === VALID_USERNAME && password === VALID_PASSWORD) || 
                (username === 'BlueAbby0209' && password === '211130')) {
                GameAPI.audio.success();
                if (rememberCheck.checked) {
                    GameAPI.storage.set('weiboSavedUsername', username);
                    GameAPI.storage.set('weiboSavedPassword', password);
                } else {
                    GameAPI.storage.set('weiboSavedUsername', null);
                    GameAPI.storage.set('weiboSavedPassword', null);
                }
                GameAPI.storage.set('weiboLoggedIn', true);
                GameAPI.storage.set('weiboUsername', username);
                console.log('✅ 微博登录成功:', username);

                // 根据账号跳转不同主页
                if (username === 'BlueAbby0209') {
                    GameAPI.navigateTo('weibo-profile.html', 400);
                } else {
                    GameAPI.navigateTo('weibo-main.html', 400);
                }
            } else {
                GameAPI.audio.error();
                showError('用户名或密码错误，请重试');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        function togglePassword() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.src = '../assets/images/unlocked.png';
            } else {
                passwordInput.type = 'password';
                toggleIcon.src = '../assets/images/locked.png';
            }
        }

        function forgotPassword() {
            GameAPI.showToast('请联系管理员重置密码', 'info');
        }

        function goRegister() {
            GameAPI.showToast('注册功能暂未开放', 'info');
        }

        function goBack() {
            GameAPI.navigateTo('desktop.html', 200);
        }

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });
        usernameInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                passwordInput.focus();
            }
        });

        console.log('🔑 微博登录页加载完成，图标已替换为本地PNG');
    </script>
</body>
</html>
