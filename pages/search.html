<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 - 寻找王曼昱</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-header {
            position: relative;
            z-index: 5;
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .btn-back {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.2s;
            color: #333;
            font-size: 20px;
            border: none;
            background: none;
        }
        .btn-back:hover { background: #f5f5f5; }
        .btn-back:active { background: #e8e8e8; }
        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 24px;
            padding: 0 16px;
            height: 42px;
            border: 1.5px solid transparent;
            transition: all 0.25s ease;
        }
        .search-input-wrapper:focus-within {
            background: #ffffff;
            border-color: #4e6ef2;
            box-shadow: 0 0 0 3px rgba(78, 110, 242, 0.1);
        }
        .search-icon { color: #999; font-size: 17px; margin-right: 8px; flex-shrink: 0; }
        .search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #333;
            font-family: var(--font-sans);
            line-height: 1.4;
        }
        .search-input::placeholder { color: #b0b0b0; font-size: 15px; }
        .btn-clear {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            border-radius: 50%;
            background: #c0c0c0;
            border: none;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            line-height: 1;
        }
        .btn-clear.show { display: flex; }
        .btn-clear:hover { background: #999; }
        .btn-search {
            flex-shrink: 0;
            padding: 0 20px;
            height: 42px;
            background: #4e6ef2;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .btn-search:hover {
            background: #3b5de7;
            box-shadow: 0 2px 8px rgba(78, 110, 242, 0.3);
        }
        .btn-search:active { transform: scale(0.96); background: #3451d9; }
        .search-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            overflow-y: auto;
        }
        .search-logo { text-align: center; margin-bottom: 10px; margin-top: 30px; }
        .search-logo .logo-text {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #4e6ef2 0%, #8b5cf6 40%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .search-logo .logo-sub { font-size: 12px; color: #999; letter-spacing: 2px; margin-top: 2px; }
        .search-box-large {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            background: #ffffff;
            border: 1.5px solid #e0e0e0;
            border-radius: 28px;
            padding: 0 20px;
            height: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .search-box-large:focus-within {
            border-color: #4e6ef2;
            box-shadow: 0 2px 16px rgba(78, 110, 242, 0.15);
        }
        .search-box-large .search-icon { font-size: 18px; margin-right: 10px; }
        .search-box-large .search-input { font-size: 16px; }
        .search-box-large .btn-search {
            height: 36px;
            padding: 0 18px;
            border-radius: 20px;
            font-size: 14px;
        }
        .search-box-large .btn-clear { margin-right: 8px; }
        .search-footer { text-align: center; padding: 20px; color: #bbb; font-size: 11px; letter-spacing: 0.5px; }
        @media (min-width: 768px) {
            .scene-container {
                max-width: 480px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 24px;
                border: 1px solid #e0e0e0;
            }
        }
        @media (min-width: 1400px) {
            .scene-container { max-width: 480px; margin: 2rem auto; border-radius: 24px; }
        }
    </style>
</head>
<body>
<div class="scene-container page-enter">

    <div class="search-header">
        <button class="btn-back" onclick="goBack()" title="返回桌面">←</button>
        <div class="search-input-wrapper" id="searchWrapperTop">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInputTop" placeholder="请输入关键词搜索" autocomplete="off">
            <button class="btn-clear" id="btnClearTop" onclick="clearInput('top')">✕</button>
        </div>
        <button class="btn-search" id="btnSearchTop" onclick="doSearch('top')">搜索</button>
    </div>

    <div class="search-body">
        <div class="search-logo">
            <div class="logo-text">Search</div>
            <div class="logo-sub">全 网 搜 索</div>
        </div>
        <div class="search-box-large" id="searchWrapperMain">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInputMain" placeholder="请输入关键词搜索" autocomplete="off">
            <button class="btn-clear" id="btnClearMain" onclick="clearInput('main')">✕</button>
            <button class="btn-search" id="btnSearchMain" onclick="doSearch('main')">搜索</button>
        </div>
    </div>

    <div class="search-footer">搜索 · 发现世界</div>

</div>

<script src="../assets/js/global.js"></script>
<script>
    const SEARCH_MAP = {
        '王曼昱': 'search-result-1.html',
        '乒乓球': 'search-result-2.html',
        '勇气': 'search-result-3.html',
        '决心': 'search-result-3.html',
        '勇气与决心': 'search-result-3.html',
        '当一个女孩非常想赢': 'search-result-5.html',
        '林高远': 'search-result-lgy.html',
    };

    const inputTop = document.getElementById('searchInputTop');
    const inputMain = document.getElementById('searchInputMain');
    const btnClearTop = document.getElementById('btnClearTop');
    const btnClearMain = document.getElementById('btnClearMain');

    inputTop.addEventListener('input', function() {
        inputMain.value = this.value;
        toggleClearButton('top');
        toggleClearButton('main');
    });
    inputMain.addEventListener('input', function() {
        inputTop.value = this.value;
        toggleClearButton('top');
        toggleClearButton('main');
    });

    function toggleClearButton(which) {
        const input = which === 'top' ? inputTop : inputMain;
        const btn = which === 'top' ? btnClearTop : btnClearMain;
        if (input.value.length > 0) {
            btn.classList.add('show');
        } else {
            btn.classList.remove('show');
        }
    }

    function clearInput(which) {
        inputTop.value = '';
        inputMain.value = '';
        btnClearTop.classList.remove('show');
        btnClearMain.classList.remove('show');
        if (which === 'top') { inputTop.focus(); } else { inputMain.focus(); }
    }

    function doSearch(from) {
        const input = from === 'top' ? inputTop : inputMain;
        const keyword = input.value.trim();
        if (!keyword) { shakeInput(); return; }
        console.log('🔍 搜索关键词:', keyword);
        GameAPI.storage.set('lastSearchKeyword', keyword);
        const targetPage = findSearchResult(keyword);
        if (targetPage) {
            GameAPI.navigateTo(targetPage, 300);
        } else {
            GameAPI.showToast('未找到相关内容，请尝试其他关键词', 'error');
        }
    }

    function findSearchResult(keyword) {
        if (SEARCH_MAP[keyword]) { return SEARCH_MAP[keyword]; }
        for (const [key, page] of Object.entries(SEARCH_MAP)) {
            if (keyword.includes(key) || key.includes(keyword)) { return page; }
        }
        return null;
    }

    function shakeInput() {
        const wrapper = document.getElementById('searchWrapperMain');
        wrapper.style.animation = 'shake 0.4s ease';
        setTimeout(() => { wrapper.style.animation = ''; }, 400);
        inputMain.focus();
    }

    function goBack() { GameAPI.navigateTo('desktop.html', 200); }

    inputMain.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch('main'); }
    });
    inputTop.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); doSearch('top'); }
    });

    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-5px); }
        }
    `;
    document.head.appendChild(shakeStyle);
</script>
</body>
</html>
