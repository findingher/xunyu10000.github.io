<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发微博</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .post-nav {
            padding: 12px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-cancel {
            font-size: 16px;
            color: #999;
            border: none;
            background: none;
            cursor: pointer;
        }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .btn-send {
            padding: 6px 18px;
            background: #ff8200;
            color: #fff;
            border: none;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-send:active { opacity: 0.8; }
        .post-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .user-edit-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-edit {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ff6b4a;
            flex-shrink: 0;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-edit img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-edit .avatar-change {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 10px;
            text-align: center;
            padding: 2px 0;
        }
        .user-input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .nickname-input {
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            padding: 4px 8px;
            background: #f5f5f5;
            border-radius: 8px;
            width: 100%;
        }
        .nickname-input::placeholder { color: #ccc; }
        .id-input {
            border: none;
            outline: none;
            font-size: 12px;
            color: #999;
            padding: 3px 8px;
            background: #f5f5f5;
            border-radius: 8px;
            width: 100%;
        }
        .id-input::placeholder { color: #ddd; }
        .post-textarea {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            color: #333;
            line-height: 1.8;
            resize: none;
            font-family: inherit;
            min-height: 120px;
        }
        .post-textarea::placeholder { color: #ccc; }
        .image-preview {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .image-preview .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            background: #f5f5f5;
            overflow: hidden;
            position: relative;
        }
        .image-preview .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-preview .preview-img .remove-img {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            color: #fff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .add-img-btn {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            border: 1.5px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #ccc;
            cursor: pointer;
            background: #fafafa;
        }
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #bbb;
        }
        .send-success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: #07c160;
            font-size: 18px;
            font-weight: 600;
            z-index: 999;
            animation: fadeInOut 2s ease forwards;
        }
        #imageInput, #avatarInput {
            display: none;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
            30% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        @media (min-width: 768px) {
            .scene-container {
                max-width: 450px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 20px;
                border: 1px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
<div class="scene-container page-enter">

    <div class="post-nav">
        <button class="btn-cancel" onclick="goBack()">取消</button>
        <span class="nav-title">发微博</span>
        <button class="btn-send" onclick="sendPost()">发送</button>
    </div>

    <div class="post-body">
        <div class="user-edit-row">
            <div class="avatar-edit" onclick="document.getElementById('avatarInput').click()">
                <img src="../assets/images/avatar-oatmeal.png" alt="头像" id="avatarPreview">
                <span class="avatar-change">更换</span>
            </div>
            <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarSelect(event)">
            <div class="user-input-group">
                <input type="text" class="nickname-input" id="nicknameInput" placeholder="输入昵称" value="再来一包燕麦片" maxlength="20">
                <input type="text" class="id-input" id="idInput" placeholder="输入用户ID" value="@EatOatmealEveryday" maxlength="30">
            </div>
        </div>

        <textarea class="post-textarea" id="postText" placeholder="有什么想说的？"></textarea>
        <div class="image-preview" id="imagePreview">
            <div class="add-img-btn" onclick="document.getElementById('imageInput').click()">＋</div>
        </div>
        <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageSelect(event)">
        <div class="char-count" id="charCount">0/140</div>
    </div>

</div>

<script src="../assets/js/global.js"></script>
<script>
    const textarea = document.getElementById('postText');
    const charCount = document.getElementById('charCount');
    const imagePreview = document.getElementById('imagePreview');
    let selectedImages = [];

    textarea.addEventListener('input', function() {
        charCount.textContent = this.value.length + '/140';
    });

    function handleAvatarSelect(event) {
        const file = event.target.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('avatarPreview').src = e.target.result;
        };
        reader.readAsDataURL(file);
        event.target.value = '';
    }

    function handleImageSelect(event) {
        const files = event.target.files;
        if (!files || files.length === 0) return;
        for (let i = 0; i < files.length; i++) {
            if (selectedImages.length >= 9) {
                GameAPI.showToast('最多添加9张图片', 'error');
                break;
            }
            const file = files[i];
            if (!file.type.startsWith('image/')) continue;
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedImages.push(e.target.result);
                renderImages();
            };
            reader.readAsDataURL(file);
        }
        event.target.value = '';
    }

    function removeImage(index) {
        selectedImages.splice(index, 1);
        renderImages();
    }

    function renderImages() {
        let html = '';
        selectedImages.forEach((img, i) => {
            html += `
                <div class="preview-img">
                    <img src="${img}" alt="图片${i+1}">
                    <span class="remove-img" onclick="event.stopPropagation();removeImage(${i})">✕</span>
                </div>
            `;
        });
        if (selectedImages.length < 9) {
            html += '<div class="add-img-btn" onclick="document.getElementById(\'imageInput\').click()">＋</div>';
        }
        imagePreview.innerHTML = html;
    }

    function sendPost() {
        const text = textarea.value.trim();
        if (!text) {
            GameAPI.showToast('请输入内容', 'error');
            return;
        }
        const nickname = document.getElementById('nicknameInput').value.trim() || '再来一包燕麦片';
        const userId = document.getElementById('idInput').value.trim() || '@EatOatmealEveryday';
        const avatarSrc = document.getElementById('avatarPreview').src;

        GameAPI.storage.set('newPostText', text);
        GameAPI.storage.set('newPostImages', JSON.stringify(selectedImages));
        GameAPI.storage.set('newPostTime', new Date().toLocaleString('zh-CN'));
        GameAPI.storage.set('newPostNickname', nickname);
        GameAPI.storage.set('newPostUserId', userId);
        GameAPI.storage.set('newPostAvatar', avatarSrc);
        GameAPI.storage.set('weiboPosted', true);

        const success = document.createElement('div');
        success.className = 'send-success';
        success.textContent = '发送成功 ✓';
        document.body.appendChild(success);
        setTimeout(() => success.remove(), 2000);

        GameAPI.audio.success();
        setTimeout(() => {
            GameAPI.navigateTo('weibo-detail.html', 400);
        }, 1500);
    }

    function goBack() {
        GameAPI.navigateTo('desktop.html', 200);
    }

    console.log('📝 发微博页面加载完成');
</script>
</body>
</html>
