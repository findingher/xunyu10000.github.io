<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微博详情</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .scene-container {
            max-width: 100vw;
            min-height: 100vh;
            margin: 0;
            border-radius: 0;
            background: #ffffff;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-nav {
            padding: 10px 16px;
            background: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-return {
            width: 28px;
            height: 28px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-return img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        .nav-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .main-scroll {
            flex: 1;
            overflow-y: auto;
        }
        .weibo-item {
            padding: 20px 16px;
        }
        .weibo-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
        }
        .weibo-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
        }
        .weibo-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .weibo-user-info { flex: 1; }
        .weibo-nickname {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        .weibo-user-id {
            font-size: 12px;
            color: #bbb;
            margin-top: 1px;
        }
        .weibo-meta {
            font-size: 12px;
            color: #bbb;
            margin-top: 2px;
        }
        .weibo-content {
            font-size: 17px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 12px;
        }
        .weibo-images {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-bottom: 12px;
            border-radius: 8px;
            overflow: hidden;
        }
        .weibo-images.img-1 { grid-template-columns: 1fr; max-width: 300px; }
        .weibo-images.img-2 { grid-template-columns: 1fr 1fr; max-width: 400px; }
        .weibo-images .img-cell {
            aspect-ratio: 1 / 1;
            background: #f5f5f5;
            overflow: hidden;
        }
        .weibo-images .img-cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .weibo-actions {
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }
        .weibo-action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 8px;
            font-size: 12px;
            color: #999;
        }
        .weibo-action-btn img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }
        .footer-ending {
            text-align: center;
            padding: 30px 16px 40px;
            color: #ccc;
            font-size: 12px;
            letter-spacing: 2px;
            line-height: 2;
        }
        .footer-ending .end-link {
            font-size: 10px;
            color: #ddd;
            cursor: pointer;
            text-decoration: underline;
        }
        @media (min-width: 768px) {
            .scene-container {
                max-width: 480px;
                margin: 0 auto;
                min-height: 90vh;
                border-radius: 16px;
                border: 1px solid #e0e0e0;
            }
        }
    </style>
</head>
<body>
<div class="scene-container page-enter">

    <div class="top-nav">
        <button class="btn-return" onclick="goBack()">
            <img src="../assets/images/weibo-return.png" alt="返回">
        </button>
        <span class="nav-title">微博正文</span>
    </div>

    <div class="main-scroll">
        <div class="weibo-item">
            <div class="weibo-header">
                <div class="weibo-avatar">
                    <img id="postAvatar" src="../assets/images/avatar-oatmeal.png" alt="头像">
                </div>
                <div class="weibo-user-info">
                    <div class="weibo-nickname" id="postNickname">再来一包燕麦片</div>
                    <div class="weibo-user-id" id="postUserId">@EatOatmealEveryday</div>
                    <div class="weibo-meta" id="postTime"></div>
                </div>
            </div>
            <div class="weibo-content" id="postText"></div>
            <div class="weibo-images" id="postImages"></div>
            <div class="weibo-actions">
                <span class="weibo-action-btn"><img src="../assets/images/weibo-share.png" alt="转发"> 转发</span>
                <span class="weibo-action-btn"><img src="../assets/images/weibo-comment.png" alt="评论"> 评论</span>
                <span class="weibo-action-btn"><img src="../assets/images/weibo-thumbsup.png" alt="赞"> 赞</span>
            </div>
        </div>

        <div class="footer-ending">
            游戏结束<br>
            THE END<br>
            <span class="end-link" onclick="goToPostscript()">前往查看作者后记</span>
        </div>
    </div>

</div>

<script src="../assets/js/global.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', function() {
        const text = GameAPI.storage.get('newPostText', '');
        const imagesStr = GameAPI.storage.get('newPostImages', '[]');
        const time = GameAPI.storage.get('newPostTime', '');
        const nickname = GameAPI.storage.get('newPostNickname', '再来一包燕麦片');
        const userId = GameAPI.storage.get('newPostUserId', '@EatOatmealEveryday');
        const avatarSrc = GameAPI.storage.get('newPostAvatar', '../assets/images/avatar-oatmeal.png');
        
        let images = [];
        try { images = JSON.parse(imagesStr); } catch(e) {}

        document.getElementById('postText').textContent = text;
        document.getElementById('postTime').textContent = time || '刚刚';
        document.getElementById('postNickname').textContent = nickname;
        document.getElementById('postUserId').textContent = userId;
        document.getElementById('postAvatar').src = avatarSrc;

        if (images.length > 0) {
            const container = document.getElementById('postImages');
            container.className = 'weibo-images img-' + images.length;
            images.forEach(img => {
                const cell = document.createElement('div');
                cell.className = 'img-cell';
                cell.innerHTML = '<img src="' + img + '" alt="图片">';
                container.appendChild(cell);
            });
        } else {
            document.getElementById('postImages').style.display = 'none';
        }
    });

    function goBack() {
        GameAPI.audio.click();
        GameAPI.showModal({
            title: '发布成功',
            content: '感谢你找到她，游戏结束',
            confirmText: '回到开始',
            onConfirm: function() {
                GameAPI.navigateTo('../index.html', 400);
            }
        });
    }

    function goToPostscript() {
        GameAPI.audio.click();
        GameAPI.navigateTo('postscript.html', 400);
    }
</script>
</body>
</html>
